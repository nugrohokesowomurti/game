<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel ="stylesheet" href="style.css">
    <title>game</title>
</head>
<body>
    <h1>Game</h1>
    <canvas id="gameCanvas" width="700px" height="500px" background="black"> 
    </canvas>
    <div>
        <button id="upBtn"
                onmousedown="keys.w = true"
                onmouseup="keys.w = false"
                ontouchstart="event.preventDefault(); keys.w = true"
                ontouchend="event.preventDefault(); keys.w = false">▲</button>
        <br>
        <button id="rightBtn" 
                onmousedown="keys.d = true"
                onmouseup="keys.d = false"
                ontouchstart="event.preventDefault(); keys.d = true"
                ontouchend="event.preventDefault(); keys.d = false">▶</button>
        <button id="downBtn"
                onmousedown="keys.s = true"
                onmouseup="keys.s = false"
                ontouchstart="event.preventDefault(); keys.s = true"
                ontouchend="event.preventDefault(); keys.s = false">▼</button>
        <br>
        <button id="leftBtn"
                onmousedown="keys.a = true"
                onmouseup="keys.a = false"
                ontouchstart="event.preventDefault(); keys.a = true"
                ontouchend="event.preventDefault(); keys.a = false">◀</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
